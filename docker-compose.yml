services:
  # ===========================================================================
  # FastAPI бэкенд
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: api
    restart: unless-stopped
    environment:
      db_user: ${db_user:-postgres}
      db_password: ${db_password:-change-me}
      db_host: ${db_host:-localhost}
      db_port: ${db_port:-5432}
      db_database: ${db_database:-arbitrage_system}
      BCS_REFRESH_TOKEN: ${BCS_REFRESH_TOKEN:-}
      BCS_SSL_VERIFY: ${BCS_SSL_VERIFY:-true}
      EXANTE_API_KEY: ${EXANTE_API_KEY:-}
      EXANTE_SECRET_KEY: ${EXANTE_SECRET_KEY:-}
      EXANTE_SHARED_KEY: ${EXANTE_SHARED_KEY:-}
      EXANTE_CLIENT_ID: ${EXANTE_CLIENT_ID:-}
      EXANTE_APPLICATION_ID: ${EXANTE_APPLICATION_ID:-}
      EXANTE_MD_API: ${EXANTE_MD_API:-https://api-live.exante.eu/md}
      EXANTE_TRADE_API: ${EXANTE_TRADE_API:-https://api-live.exante.eu/trade}
      EXANTE_API_VERSION: ${EXANTE_API_VERSION:-3.0}
      EXANTE_SSL_VERIFY: ${EXANTE_SSL_VERIFY:-true}
    ports:
      - "8000:8000"             # опционально — прямой доступ к API
    volumes:
      - ./data:/app/data        # персистентные файлы (кэш токенов и т.п.)

  # ===========================================================================
  # Фронтенд (Vue + Nginx)
  # ===========================================================================
  web:
    build:
      context: ./frontend
    container_name: web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

